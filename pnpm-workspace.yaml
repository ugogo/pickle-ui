# Supply-chain hardening (see https://pnpm.io/settings)

# Fail if a package's trust signals (provenance, signatures) weaken between
# releases instead of silently accepting the downgrade.
trustPolicy: no-downgrade

# semver lacks provenance on the version release-it pulls transitively (via
# Babel). It's a benign, ubiquitous package, so exempt it from the downgrade
# check rather than weaken the policy globally.
trustPolicyExclude:
  - semver

# Block transitive deps resolved from non-registry sources (git/file/tarball).
blockExoticSubdeps: true
