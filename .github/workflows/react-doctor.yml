name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      # `doctor.config.ts` does `import { defineConfig } from 'react-doctor/api'`,
      # so react-doctor can only load the config when the dependency is installed.
      # Without this step the config silently fails to resolve and the action
      # falls back to its default rules (which is why CI reported findings the
      # pre-commit hook does not).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React Doctor
        uses: millionco/react-doctor@v2
        with:
          # Match the react-doctor version pinned in package.json so CI and the
          # pre-commit hook evaluate the exact same ruleset.
          version: 0.5.1
