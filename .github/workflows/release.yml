name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check lint and formatting
        run: |
          pnpm run lint
          pnpm run format:check

      - name: Configure release commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git branch --set-upstream-to=origin/main main

      - name: Release
        run: pnpm exec release-it "${{ inputs.bump }}" --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
